services:
  - type: web
    name: beyond-borders-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://beyond-borders-web.onrender.com

  - type: web
    name: beyond-borders-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://beyond-borders-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
